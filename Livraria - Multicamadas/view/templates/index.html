<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Livraria Moderna</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f8f9fa;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin: 40px 0; color: var(--primary); font-weight: 300; font-size: 2.5rem; }

        .container {
            width: 90%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding-bottom: 50px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover { transform: translateY(-5px); }

        .card h3 { margin: 0 0 10px 0; color: var(--primary); }

        .price {
            font-size: 1.2rem;
            font-weight: bold;
            color: #27ae60;
            margin-bottom: 20px;
        }

        .btn-buy {
            text-align: center;
            background: var(--accent);
            color: white;
            padding: 10px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-buy:hover { background: #2980b9; }
    </style>
</head>
<body>

<h1> Nossa Livraria</h1>

<div class="container">
    {% for livro in livros %}
    <div class="card">
        <div>
            <h3>{{ livro.nome }}</h3>
            <p class="price">R$ {{ livro.preco }}</p>
        </div>
        <a href="/comprar/{{ loop.index0 }}" class="btn-buy">Comprar Agora</a>
    </div>
    {% endfor %}
</div>

</body>
</html>
