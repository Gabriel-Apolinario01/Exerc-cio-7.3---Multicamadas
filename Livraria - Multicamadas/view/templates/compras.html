<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Histórico de Compras</title>

    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f8f9fa;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin: 40px 0 20px 0;
            color: var(--primary);
            font-weight: 300;
            font-size: 2.2rem;
        }

        .container {
            width: 90%;
            max-width: 800px;
        }

        .card {
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.08);
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card h3 {
            margin: 0;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .price {
            font-weight: bold;
            color: #27ae60;
        }

        .empty {
            text-align: center;
            color: #777;
            margin-top: 20px;
        }

        .back-link {
            margin-top: 30px;
            text-decoration: none;
            color: #666;
            font-size: 0.9rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<h1> Histórico de Compras</h1>

<div class="container">
    {% if compras %}
        {% for livro in compras %}
        <div class="card">
            <h3>{{ livro.nome }}</h3>
            <span class="price">R$ {{ livro.preco }}</span>
        </div>
        {% endfor %}
    {% else %}
        <p class="empty">Nenhuma compra realizada ainda.</p>
    {% endif %}
</div>

<a href="/" class="back-link"> Voltar para a loja</a>

</body>
</html>
