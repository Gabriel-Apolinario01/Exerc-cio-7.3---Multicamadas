<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Compra Realizada</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0fdf4;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .receipt-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
        }

        .icon { font-size: 50px; margin-bottom: 10px; }

        h1 { color: #166534; font-size: 1.5rem; }

        .details {
            background: #f9fafb;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px dashed #ccc;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="receipt-card">
    <div class="icon"></div>
    <h1>Pedido Confirmado!</h1>

    <div class="details">
        <p><strong>Livro:</strong> {{ livro.nome }}</p>
        <p><strong>Valor Pago:</strong> R$ {{ livro.preco }}</p>
    </div>

    <p>Obrigado pela sua compra!</p>

    <div>
        <a href="/compras" class="back-link" style="margin-right: 15px;">Ir para o Histórico</a>
        <a href="/" class="back-link">Voltar para a loja</a>
    </div>
</div>

</body>
</html>
